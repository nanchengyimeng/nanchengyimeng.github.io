        <h1 class="title">常用服务容器搭建命令</h1>
        <div class="stuff">
            <span>四月 01, 2023</span>
            
  <ul class="post-tags-list" itemprop="keywords"><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/docker/" rel="tag">docker</a></li></ul>


        </div>
        <div class="content markdown">
            <h3 id="mysql"><a href="#mysql" class="headerlink" title="mysql"></a>mysql</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker run --name mysql -p 3306:3306 -e MYSQL_ROOT_PASSWORD=mengdan --network=mengdan -d mysql:latest</span><br></pre></td></tr></table></figure>

<h3 id="redis"><a href="#redis" class="headerlink" title="redis"></a>redis</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker run -p 6379:6379 --name redis -d --network=mengdan redis:latest redis-server</span><br></pre></td></tr></table></figure>

<h3 id="etcd"><a href="#etcd" class="headerlink" title="etcd"></a>etcd</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">docker run -d --name etcd-server --network mengdan --publish 2379:2379 --publish 2380:2380 --<span class="built_in">env</span> ALLOW_NONE_AUTHENTICATION=<span class="built_in">yes</span> --<span class="built_in">env</span> ETCD_ADVERTISE_CLIENT_URLS=http://127.0.0.1:2379 bitnami/etcd:latest</span><br><span class="line">docker run -it --<span class="built_in">rm</span> --network mengdan --<span class="built_in">env</span> ALLOW_NONE_AUTHENTICATION=<span class="built_in">yes</span> bitnami/etcd:latest etcdctl --endpoints http://127.0.0.1:2379 <span class="built_in">set</span> /message Hello</span><br></pre></td></tr></table></figure>

<h3 id="rabbitmq"><a href="#rabbitmq" class="headerlink" title="rabbitmq"></a>rabbitmq</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker run -d --name rabbitmq-server -e  RABBITMQ_DEFAULT_USER=mengdan -e RABBITMQ_DEFAULT_PASS=mengdan -p 15672:15672 -p 5672:5672 --network mengdan --network-alias rabbitmq_server f2236</span><br></pre></td></tr></table></figure>

<h3 id="mongodb"><a href="#mongodb" class="headerlink" title="mongodb"></a>mongodb</h3><figure class="highlight bash"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">docker run -d  -p 27017:27017 --network mengdan --network-alias mongo_server  --name mongodb -e MONGO_INITDB_ROOT_USERNAME=mengdan -e MONGO_INITDB_ROOT_PASSWORD=mengdan mongo</span><br></pre></td></tr></table></figure>
